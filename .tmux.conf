# ====== Core ======
set -g prefix C-a
unbind C-b
bind C-a send-prefix

set -s escape-time 0
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

set -g default-shell /usr/bin/zsh

# ====== Display ======
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB"
set -ga terminal-overrides ",xterm*:Su=\\E[4:3m,Smulx=\\E[4::%p1%dm"

# Distinguish Ctrl-h from Backspace via CSI u (kitty keyboard protocol).
# Required for vim-tmux-navigator style C-h binding to work in Ghostty.
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'
set -as terminal-features 'ghostty*:extkeys'

# Forward copy-buffer to host clipboard via OSC 52 (no external command needed).
set -g set-clipboard on
set -as terminal-features 'xterm*:clipboard'
set -as terminal-features 'ghostty*:clipboard'

# ====== Status bar (top, Gruvbox Dark Hard) ======
set -g status-position top
set -g status-interval 5
set -g status-style "fg=#ebdbb2,bg=#1d2021"
set -g window-status-current-style "fg=#1d2021,bg=#fabd2f,bold"
set -g window-status-style "fg=#a89984,bg=#1d2021"
set -g pane-border-style "fg=#3c3836"
set -g pane-active-border-style "fg=#fabd2f"
set -g message-style "fg=#1d2021,bg=#fabd2f"
set -g status-left-length 40
set -g status-left "#[fg=#fabd2f,bold] #S "
set -g status-right "#[fg=#83a598] %Y-%m-%d %H:%M "

# ====== Bell (Claude Code notification) ======
set -g monitor-bell on
set -g bell-action other
set -g visual-bell off
set -g window-status-bell-style "fg=#1d2021,bg=#fb4934,bold"

# ====== Mouse ======
set -g mouse on

# ====== Vi copy-mode + OSC 52 clipboard ======
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-and-cancel

# ====== smart-splits.nvim 連携 (vim-tmux-navigator 流儀) ======
# 現在のペインで vim/nvim が動いてるか判定して、動いてればキーを Neovim に送る
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?|fzf)(diff)?$'"

bind -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

bind -n 'M-h' if-shell "$is_vim" 'send-keys M-h' 'resize-pane -L 3'
bind -n 'M-j' if-shell "$is_vim" 'send-keys M-j' 'resize-pane -D 3'
bind -n 'M-k' if-shell "$is_vim" 'send-keys M-k' 'resize-pane -U 3'
bind -n 'M-l' if-shell "$is_vim" 'send-keys M-l' 'resize-pane -R 3'

bind -T copy-mode-vi 'C-h' select-pane -L
bind -T copy-mode-vi 'C-j' select-pane -D
bind -T copy-mode-vi 'C-k' select-pane -U
bind -T copy-mode-vi 'C-l' select-pane -R

# ====== Splits ======
bind \\ split-window -h -c '#{pane_current_path}'
bind - split-window -v -c '#{pane_current_path}'

# ====== Reload ======
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# ====== Plugins ======
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @resurrect-strategy-nvim 'session'
set -g @continuum-save-interval '15'
set -g @continuum-restore 'on'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
